[project]
name = "stacks-storage"
description = "Encrypted file storage on IPFS with programmable access control via Stacks"
authors = []
telemetry = false
cache_dir = "./.cache"

[contracts.file-registry]
path = "contracts/file-registry.clar"
clarity_version = 4
epoch = "latest"

[contracts.acn-payments]
path = "contracts/acn-payments.clar"
clarity_version = 4
epoch = "latest"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
